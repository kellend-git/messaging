name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Sync version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix sdk/node
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install
        working-directory: sdk/node

      - name: Build
        run: bun run build
        working-directory: sdk/node

      - name: Test
        run: bun test
        working-directory: sdk/node

      - name: Check if version is already published
        id: check-published
        run: |
          if npm view "@astropods/messaging@${{ env.VERSION }}" version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "::notice::v${{ env.VERSION }} is already published on npm"
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check-published.outputs.published == 'false'
        run: npm publish --access public
        working-directory: sdk/node

      - name: Commit and tag release
        run: |
          git config user.name "astro-ci-bot[bot]"
          git config user.email "${{ secrets.CI_APP_ID }}+astro-ci-bot[bot]@users.noreply.github.com"
          git add sdk/node/package.json
          git diff --staged --quiet || git commit -m "chore: release v${{ env.VERSION }}"
          if ! git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            git tag "v${{ env.VERSION }}"
          fi
          git push origin HEAD --tags --force-with-lease
