name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Sync version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix sdk/node
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install
        working-directory: sdk/node

      - name: Build
        run: bun run build
        working-directory: sdk/node

      - name: Test
        run: bun test
        working-directory: sdk/node

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: sdk/node

      - name: Commit and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/node/package.json
          git diff --staged --quiet || git commit -m "chore: release v${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}" --force
          git push origin HEAD --tags --force-with-lease
